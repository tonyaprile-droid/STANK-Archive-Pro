name: Build STANK Archive Pro

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --clean --windowed --name "STANK Archive Pro" --add-data "assets;assets" main.py

      - name: Create ZIP
        run: |
          powershell Compress-Archive -Path "dist/STANK Archive Pro/*" -DestinationPath "STANK_Archive_Pro_Portable.zip"

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: STANK-Archive-Pro-Portable
          path: STANK_Archive_Pro_Portable.zip