name: Build STANK Archive Pro

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller pillow

      - name: Build portable app
        run: |
          python -m PyInstaller --clean --noconfirm --windowed --name "STANK Archive Pro" --icon "assets\app_icon.ico" --add-data "assets;assets" main.py

      - name: Package portable ZIP
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path "dist\STANK Archive Pro\*" -DestinationPath "release\STANK_Archive_Pro_v1.0.0_Portable.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: STANK-Archive-Pro-v1.0.0-Portable
          path: release/STANK_Archive_Pro_v1.0.0_Portable.zip

      - name: Attach ZIP to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: release/STANK_Archive_Pro_v1.0.0_Portable.zip
