name: Build and Release STANK Archive Pro

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Build EXE
        run: |
          python -m PyInstaller --clean --noconfirm --windowed --name "STANK Archive Pro" main.py

      - name: Create Portable ZIP
        shell: powershell
        run: |
          Compress-Archive -Path "dist\STANK Archive Pro\*" -DestinationPath "STANK_Archive_Pro_Portable.zip"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: STANK_Archive_Pro_Portable.zip
          generate_release_notes: true